# Default values for mnemosyne.
# This is a YAML-formatted file.

image:
  repository: ghcr.io/jzcharie/mnemosyne
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
    - ALL

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: "traefik"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: api-mnemosyne.p.zacharie.org
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: mnemosyne-api-tls
      hosts:
        - api-mnemosyne.p.zacharie.org

deployment:
  enabled: true
  replicaCount: 1

cronjob:
  enabled: false # Disabled by default if running as deployment
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 3
  successfulJobsHistoryLimit: 1

config:
  collectionName: "mnemosyne_docs"
  embeddingModel: "zembed-132k"
  litellmUrl: "http://litellm.litellm.svc.cluster.local:4000"
  nfsPath: "/mnt/xpool"
  dbUser: "app"
  dbHost: "cluster-pg-sbx-rw.pg-sbx.svc.cluster.local"
  dbName: "app"

externalSecrets:
  enabled: true
  refreshInterval: "1m"
  secretStoreName: "vault-backend"
  secretStoreKind: "ClusterSecretStore"
  vaultPath: "ai/mnemosyne"
  dbVaultPath: "pg-sbx/grafana"

qdrant:
  url: "http://qdrant.qdrant.svc.cluster.local:6334"

tei:
  embedder:
    enabled: true
    model: "BAAI/bge-m3"
    url: "http://mnemosyne-tei-embedder.mnemosyne.svc.cluster.local"
    image:
      repository: ghcr.io/huggingface/text-embeddings-inference
      tag: cpu-latest
    # runtimeClassName: nvidia
    # dtype: float16
    # maxBatchTokens: "32768"
    resources:
      requests:
        cpu: 2
        memory: 8Gi
      limits:
        cpu: 4
        memory: 12Gi
  reranker:
    enabled: true
    model: "BAAI/bge-reranker-large"
    url: "http://mnemosyne-tei-reranker.mnemosyne.svc.cluster.local"
    image:
      repository: ghcr.io/huggingface/text-embeddings-inference
      tag: cpu-latest
    # runtimeClassName: nvidia
    # dtype: float16
    # maxBatchTokens: "32768"



persistence:
  pvcs:
    - name: nfs-data
      claimName: mnemosyne-pvc
      mountPath: /data/nfs
  volumes: []

resources:
  requests:
    cpu: 2
    memory: 8Gi
  limits:
    cpu: 4
    memory: 16Gi

nodeSelector: {}
tolerations: []
affinity: {}
