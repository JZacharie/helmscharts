replicaCount: 1

image:
  repository: ghcr.io/jzacharie/antigravity-remote
  pullPolicy: Always
  tag: "latest"

nameOverride: ""
fullnameOverride: ""
runtimeClassName: nvidia
imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  capabilities:
    add:
      - NET_ADMIN

service:
  type: ClusterIP
  port: 6080
  vncPort: 5901

ingress:
  enabled: true
  className: "traefik"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production-dns
    gethomepage.dev/description: AI Coding Desktop
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: AI
    gethomepage.dev/icon: mdi-console
    gethomepage.dev/name: Antigravity
    gethomepage.dev/ping: antigravity.p.zacharie.org
    kubernetes.io/ingress.class: traefik
  hosts:
    - host: antigravity.p.zacharie.org
      paths:
        - path: /
          pathType: Prefix
          port: 6080
  tls:
    - secretName: antigravity-tls
      hosts:
        - antigravity.p.zacharie.org

resources:
  limits:
    cpu: 8000m
    memory: 8Gi
  requests:
    cpu: 1000m
    memory: 4Gi

persistence:
  enabled: true
  size: 50Gi
  accessModes:
    - ReadWriteOnce
  storageClass: ""

externalSecret:
  enabled: true
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  remoteRefs:
    VNC_PASSWORD:
      key: antigravity
      property: ANTIGRAVITY_SERVER_PASSWORD
    LITELLM_API_KEY:
      key: antigravity
      property: LITELLM_API_KEY
    ANTIGRAVITY_SERVER_PASSWORD:
      key: antigravity
      property: ANTIGRAVITY_SERVER_PASSWORD

env:
  DISPLAY_WIDTH: "1920"
  DISPLAY_HEIGHT: "1080"
  DISPLAY_DEPTH: "24"
  TZ: "Europe/Paris"
  ANTIGRAVITY_AUTO_UPDATE: "true"
  AUTOSTART_ANTIGRAVITY: "false"
  NVIDIA_VISIBLE_DEVICES: "all"
  NVIDIA_DRIVER_CAPABILITIES: "all"
  IDLE_CHECK_INTERVAL: "30"
  IDLE_TIMEOUT: "60"
  IDLE_PAUSE_ANTIGRAVITY: "false"
  LOCAL_ENDPOINT: "http://litellm.litellm.svc.cluster.local:4000/v1"
  NODE_TLS_REJECT_UNAUTHORIZED: "0"

autoscaling:
  enabled: false

imagePullSecrets: []
nodeSelector:
  kubernetes.io/hostname: vm169
tolerations:
  - key: "special-node"
    operator: "Equal"
    value: "gpu"
    effect: "NoSchedule"
affinity: {}

antigravityConfig:
  providers:
    litellm:
      name: "LiteLLM"
      base_url: "http://litellm.litellm.svc.cluster.local:4000/v1/"
      type: "openai-compat"
      models:
        - name: "GPT-OSS 120B"
          id: "gpt-oss-120b"
          context_window: 128000
          default_max_tokens: 16000
        - name: "Claude 3.7 Sonnet"
          id: "claude-3.7-sonnet"
          context_window: 200000
          default_max_tokens: 16000
        - name: "Gemini 3 Flash"
          id: "gemini-3-flash"
          context_window: 1000000
          default_max_tokens: 16000
        - name: "Qwen 3.5 Cloud"
          id: "qwen3.5:cloud"
          context_window: 128000
          default_max_tokens: 16000
        - name: "DeepSeek V3.2 Cloud"
          id: "deepseek-v3.2:cloud"
          context_window: 128000
          default_max_tokens: 16000
  agents:
    coder:
      model: "litellm.gpt-oss-120b"
      reasoningEffort: "high"
