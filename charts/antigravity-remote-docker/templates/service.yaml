apiVersion: v1
kind: Service
metadata:
  name: {{ include "antigravity.fullname" . }}
  labels:
    {{- include "antigravity.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: 8080
      targetPort: code
      protocol: TCP
      name: code
  selector:
    {{- include "antigravity.selectorLabels" . | nindent 4 }}
