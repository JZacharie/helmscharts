apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "graphon.fullname" . }}
  labels:
    {{- include "graphon.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "graphon.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "graphon.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          command: ["/app/graphon-server"]
          args: ["--server"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.secretName | default "graphon-secrets" }}
                  key: database-url
            - name: GMAIL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.gmail.secretName | default "graphon-secrets" }}
                  key: gmail-token
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.gmail.secretName | default "graphon-secrets" }}
                  key: google-client-id
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.gmail.secretName | default "graphon-secrets" }}
                  key: google-client-secret
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.llm.secretName | default "graphon-secrets" }}
                  key: llm-api-key
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
