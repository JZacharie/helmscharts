apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "antigravity.fullname" . }}
  labels:
    {{- include "antigravity.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      {{- include "antigravity.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "antigravity.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "antigravity.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      runtimeClassName: nvidia
      containers:
      - name: {{ .Chart.Name }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
          seccompProfile:
            type: Unconfined
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        env:
        {{- range $key, $value := .Values.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        - name: VNC_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "antigravity.fullname" . }}-secrets
              key: VNC_PASSWORD
              optional: true
        ports:
        - containerPort: {{ .Values.service.port }}
          name: http
          protocol: TCP
        - containerPort: {{ .Values.service.vncPort }}
          name: vnc
          protocol: TCP
        volumeMounts:
        - name: data
          mountPath: /home/antigravity/workspace
          subPath: workspace
        - name: data
          mountPath: /home/antigravity/.config
          subPath: config
        - name: data
          mountPath: /home/antigravity/.antigravity
          subPath: antigravity
        - name: dshm
          mountPath: /dev/shm
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
      volumes:
      - name: data
        {{- if .Values.persistence.enabled }}
        persistentVolumeClaim:
          claimName: {{ include "antigravity.fullname" . }}-home
        {{- else }}
        emptyDir: {}
        {{- end }}
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 2Gi
      dnsPolicy: Default
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
