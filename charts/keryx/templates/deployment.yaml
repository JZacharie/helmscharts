{{- range $serviceName, $service := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "keryx.fullname" $ }}-{{ $serviceName }}
  labels:
    {{- include "keryx.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $serviceName }}
spec:
  replicas: {{ if kindIs "invalid" $service.replicaCount }}1{{ else }}{{ $service.replicaCount }}{{ end }}
  selector:
    matchLabels:
      app.kubernetes.io/component: {{ $serviceName }}
  template:
    metadata:
      labels:
        {{- include "keryx.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ $serviceName }}
    spec:
      {{- if eq $serviceName "orchestrator" }}
      serviceAccountName: {{ include "keryx.fullname" $ }}-orchestrator-sa
      {{- end }}
      {{- with $.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if $service.gpu }}
      runtimeClassName: {{ default "nvidia" $service.runtimeClassName }}
      {{- end }}
      securityContext:
        runAsNonRoot: {{ if $service.securityContext }}{{ default true $service.securityContext.runAsNonRoot }}{{ else }}true{{ end }}
        runAsUser: {{ if $service.securityContext }}{{ default 1000 $service.securityContext.runAsUser }}{{ else }}1000{{ end }}
        runAsGroup: {{ if $service.securityContext }}{{ default 1000 $service.securityContext.runAsGroup }}{{ else }}1000{{ end }}
      containers:
        - name: {{ $serviceName }}
          image: "{{ $service.image }}:{{ default $.Values.global.image.tag $service.imageTag }}"
          imagePullPolicy: {{ $.Values.global.image.pullPolicy }}
          envFrom:
            - secretRef:
                name: keryx-secrets
          ports:
            - name: http
              containerPort: {{ $service.containerPort }}
              protocol: TCP
          env:

            - name: S3_ENDPOINT
              value: {{ $.Values.global.s3.endpoint | quote }}
            - name: S3_BUCKET
              value: {{ $.Values.global.s3.bucket | quote }}
            - name: S3_REGION
              value: {{ $.Values.global.s3.region | quote }}

            {{- if eq $serviceName "orchestrator" }}
            - name: EXTRACTOR_URL
              value: "http://{{ include "keryx.fullname" $ }}-extractor:{{ $.Values.services.extractor.servicePort | default 8000 }}"
            - name: DEWATERMARK_URL
              value: "http://{{ include "keryx.fullname" $ }}-dewatermark:{{ $.Values.services.dewatermark.servicePort | default 8000 }}"
            - name: VOICE_EXTRACTOR_URL
              value: "http://{{ include "keryx.fullname" $ }}-voice-extractor:{{ (index $.Values.services "voice-extractor").servicePort | default 8000 }}"
            - name: VIDEO_COMPOSER_URL
              value: "http://{{ include "keryx.fullname" $ }}-video-composer:{{ (index $.Values.services "video-composer").servicePort | default 8000 }}"
            - name: VIDEO_GENERATOR_URL
              value: "http://{{ include "keryx.fullname" $ }}-wan2gp:{{ (index $.Values.services "wan2gp").servicePort | default 8000 }}"
            - name: VOICE_CLONER_URL
              value: "http://{{ include "keryx.fullname" $ }}-voice-cloner:{{ (index $.Values.services "voice-cloner").servicePort | default 8000 }}"
            {{- end }}
            {{- with $service.env }}
            {{- range $name, $value := . }}
            - name: {{ $name }}
              {{- if kindIs "map" $value }}
              {{- toYaml $value | nindent 14 }}
              {{- else }}
              value: {{ $value | quote }}
              {{- end }}
            {{- end }}
            {{- end }}
            {{- if $.Values.global.otel.enabled }}
            - name: OTEL_ENDPOINT
              value: {{ $.Values.global.otel.endpoint | quote }}
            - name: OTEL_SERVICE_NAME
              value: {{ printf "keryx-%s" $serviceName | quote }}
            {{- end }}
          securityContext:
            runAsNonRoot: {{ if $service.securityContext }}{{ default true $service.securityContext.runAsNonRoot }}{{ else }}true{{ end }}
            runAsUser: {{ if $service.securityContext }}{{ default 1000 $service.securityContext.runAsUser }}{{ else }}1000{{ end }}
            allowPrivilegeEscalation: false
          resources:
            {{- if $service.resources }}
            {{- toYaml $service.resources | nindent 12 }}
            {{- else }}
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
            {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ default 5 $service.readinessInitialDelay }}
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ default 15 $service.livenessInitialDelay }}
            periodSeconds: 20
            failureThreshold: 5
          {{- if $service.persistence }}
          volumeMounts:
            - name: data
              mountPath: {{ $service.persistence.mountPath }}
          {{- end }}
      {{- with $.Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if $service.persistence }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "keryx.fullname" $ }}-{{ $serviceName }}
      {{- end }}
{{- end }}
