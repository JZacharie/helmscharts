apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
      - name: gateway
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        command: ["python", "/app/scripts/main.py"]
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: {{ .Values.env.databaseUrlSecretName }}
              key: {{ .Values.env.databaseUrlSecretKey }}
        - name: LITELLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.env.litellmApiKeySecretName }}
              key: {{ .Values.env.litellmApiKeySecretKey }}
        - name: NFS_PATH
          value: "/data/nfs"
        - name: LITELLM_URL
          value: {{ .Values.config.litellmUrl | quote }}
        - name: BASE_URL
          value: {{ .Values.config.baseUrl | quote }}
        - name: COLLECTION_NAME
          value: {{ .Values.config.collectionName | quote }}
        - name: EMBEDDING_MODEL
          value: {{ .Values.config.embeddingModel | quote }}
        volumeMounts:
        - name: nfs-data
          mountPath: /data/nfs
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
      volumes:
      - name: nfs-data
        persistentVolumeClaim:
          claimName: {{ .Release.Name }}-nfs-pvc
