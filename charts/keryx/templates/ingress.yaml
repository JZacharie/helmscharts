{{- range $serviceName, $service := .Values.services }}
{{- if $service.ingress }}
{{- if $service.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "keryx.fullname" $ }}-{{ $serviceName }}
  labels:
    {{- include "keryx.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $serviceName }}
  {{- with $service.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ $service.ingress.className }}
  {{- if $service.ingress.tls }}
  tls:
    {{- range $service.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range $service.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "keryx.fullname" $ }}-{{ $serviceName }}
                port:
                  number: {{ $service.servicePort }}
          {{- end }}
    {{- end }}
{{- end }}
{{- end }}
{{- end }}
