# Default values for keryx.
# This is a YAML-formatted file.

global:
  s3:
    endpoint: "https://minio-170-api.zacharie.org"
    bucket: "keryx"
    region: "us-east-1"
    existingSecret: "keryx-secrets"
  redis:
    url: "redis://localhost:6379"
    existingSecret: "keryx-secrets"
    existingSecretKey: "REDIS_URL"
  image:
    pullPolicy: Always
    tag: "latest"
  nodeSelector:
    env: prd
  tolerations:
    - key: "special-node"
      operator: "Equal"
      value: "gpu"
      effect: "NoSchedule"

  # OpenTelemetry — APM + Service Map → OpenObserve
  otel:
    enabled: true
    # Endpoint OTLP/gRPC d'OpenObserve (port 5081)
    endpoint: "http://o2-openobserve-router.openobserve.svc:5080"
    # Secret Kubernetes contenant OTEL_AUTH_TOKEN (Basic base64)
    existingSecret: "keryx-secrets"
    authTokenKey: "OTEL_AUTH_TOKEN"

services:
  orchestrator:
    name: orchestrator
    image: ghcr.io/jzacharie/keryx-orchestrator
    containerPort: 3000
    servicePort: 8000
    env:
      RUST_LOG: "info"
    resources:
      limits:
        cpu: 1000m
        memory: 4Gi
      requests:
        cpu: 500m
        memory: 2Gi
    ingress:
      enabled: true
      className: "traefik"
      annotations:
        gethomepage.dev/enabled: "true"
        gethomepage.dev/name: "Keryx Orchestrator"
        gethomepage.dev/group: "AI Pipeline"
        gethomepage.dev/icon: "mdi-video-input-component"
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        traefik.ingress.kubernetes.io/router.middlewares: default-cors-middleware@kubernetescrd
      hosts:
        - host: orchestrator.p.zacharie.org
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - orchestrator.p.zacharie.org
          secretName: tls-zacharie-org

  frontend:
    name: frontend
    image: ghcr.io/jzacharie/keryx-frontend
    containerPort: 3000
    servicePort: 8000
    env:
      NEXT_PUBLIC_API_URL: "https://orchestrator.p.zacharie.org"
    ingress:
      enabled: true
      className: "traefik"
      hosts:
        - host: keryx.p.zacharie.org
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - keryx.p.zacharie.org
          secretName: tls-zacharie-org

  diffusion-engine:
    name: diffusion-engine
    image: ghcr.io/jzacharie/keryx-diffusion-engine
    containerPort: 8000
    servicePort: 8000
    gpu: true
    resources:
      limits:
        memory: 16Gi
    env:
      MODEL_ID: "stabilityai/sdxl-turbo"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,video

  extractor:
    name: extractor
    image: ghcr.io/jzacharie/keryx-extractor
    containerPort: 8000
    servicePort: 8000
    resources:
      limits:
        cpu: 1000m
        memory: 4Gi
      requests:
        cpu: 500m
        memory: 2Gi

  dewatermark:
    name: dewatermark
    image: ghcr.io/jzacharie/keryx-dewatermark
    containerPort: 8000
    servicePort: 8000
    gpu: true
    env:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,video
    resources:
      limits:
        cpu: 2000m
        memory: 8Gi
      requests:
        cpu: 1000m
        memory: 4Gi

  voice-extractor:
    name: voice-extractor
    image: ghcr.io/jzacharie/keryx-voice-extractor
    containerPort: 8000
    servicePort: 8000
    gpu: true
    env:
      OLLAMA_URL: "http://192.168.0.58:11434"
      WHISPER_CACHE_DIR: "/app/.cache/whisper"
      WHISPER_MODEL: "medium"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,video
    persistence:
      enabled: true
      size: 10Gi
      mountPath: /app/.cache/whisper
    resources:
      limits:
        cpu: 2000m
        memory: 8Gi
      requests:
        cpu: 1000m
        memory: 4Gi

  video-composer:
    name: video-composer
    image: ghcr.io/jzacharie/keryx-video-composer
    containerPort: 8000
    servicePort: 8000
    gpu: true
    env:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,video
    resources:
      limits:
        cpu: 1000m
        memory: 4Gi
      requests:
        cpu: 500m
        memory: 2Gi

  video-generator:
    name: video-generator
    image: ghcr.io/jzacharie/keryx-video-generator
    containerPort: 8000
    servicePort: 8000
    gpu: true
    env:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,video
    resources:
      limits:
        cpu: 2000m
        memory: 16Gi
      requests:
        cpu: 1000m
        memory: 8Gi

  voice-cloner:
    name: voice-cloner
    image: ghcr.io/jzacharie/keryx-voice-cloner
    containerPort: 8000
    servicePort: 8000
    gpu: true
    env:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,video
    resources:
      limits:
        cpu: 2000m
        memory: 16Gi
      requests:
        cpu: 1000m
        memory: 8Gi
    persistence:
      enabled: true
      size: 10Gi
      mountPath: /root/.local/share/tts

  pptx-builder:
    name: pptx-builder
    image: ghcr.io/jzacharie/keryx-pptx-builder
    containerPort: 8000
    servicePort: 8000
    resources:
      limits:
        cpu: 1000m
        memory: 2Gi
      requests:
        cpu: 500m
        memory: 1Gi
