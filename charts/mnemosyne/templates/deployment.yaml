{{- if .Values.deployment.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mnemosyne.fullname" . }}
  labels:
    {{- include "mnemosyne.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.deployment.replicaCount }}
  selector:
    matchLabels:
      {{- include "mnemosyne.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "mnemosyne.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "mnemosyne.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "mnemosyne.fullname" . }}-secrets
                  key: DATABASE_URL
            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "mnemosyne.fullname" . }}-secrets
                  key: LITELLM_API_KEY
            - name: COLLECTION_NAME
              value: {{ .Values.config.collectionName | quote }}
            - name: EMBEDDING_MODEL
              value: {{ .Values.config.embeddingModel | quote }}
            - name: LITELLM_URL
              value: {{ .Values.config.litellmUrl | quote }}
            - name: NFS_PATH
              valueFrom:
                secretKeyRef:
                  name: {{ include "mnemosyne.fullname" . }}-secrets
                  key: NFS_PATH
            - name: QDRANT_URL
              value: {{ .Values.qdrant.url | quote }}
            - name: TEI_EMBEDDER_URL
              value: {{ .Values.tei.embedder.url | quote }}
            - name: TEI_RERANKER_URL
              value: {{ .Values.tei.reranker.url | quote }}
          volumeMounts:
            {{- range .Values.persistence.pvcs }}
            - name: {{ .name }}
              mountPath: {{ .mountPath }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        {{- range .Values.persistence.pvcs }}
        - name: {{ .name }}
          persistentVolumeClaim:
            claimName: {{ .claimName }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
