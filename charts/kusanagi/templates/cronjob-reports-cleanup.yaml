{{- if .Values.reportsCleanup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "kusanagi.fullname" . }}-reports-cleanup
  labels:
    {{- include "kusanagi.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.reportsCleanup.schedule | quote }}
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 1
  successfulJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          name: {{ include "kusanagi.fullname" . }}-reports-cleanup
          labels:
            {{- include "kusanagi.selectorLabels" . | nindent 12 }}
        spec:
          restartPolicy: OnFailure
          containers:
          - name: cleanup
            image: minio/mc:latest
            imagePullPolicy: IfNotPresent
            command:
            - /bin/sh
            - -c
            - |
              mc alias set myminio "$S3_ENDPOINT" "$S3_ACCESS_KEY" "$S3_SECRET_KEY" && \
              mc rm --recursive --force --older-than {{ .Values.reportsCleanup.olderThan }} myminio/"$S3_BUCKET"/
            env:
            {{- if .Values.s3.endpoint }}
            - name: S3_ENDPOINT
              value: {{ .Values.s3.endpoint | quote }}
            {{- end }}
            {{- if .Values.s3.access_key }}
            - name: S3_ACCESS_KEY
              value: {{ .Values.s3.access_key | quote }}
            {{- end }}
            {{- if .Values.s3.secret_key }}
            - name: S3_SECRET_KEY
              value: {{ .Values.s3.secret_key | quote }}
            {{- end }}
            {{- if .Values.s3.bucket }}
            - name: S3_BUCKET
              value: {{ .Values.s3.bucket | quote }}
            {{- end }}
{{- end }}
