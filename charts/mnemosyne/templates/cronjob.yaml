{{- if .Values.cronjob.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "mnemosyne.fullname" . }}
  labels:
    {{- include "mnemosyne.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.cronjob.schedule | quote }}
  concurrencyPolicy: {{ .Values.cronjob.concurrencyPolicy }}
  failedJobsHistoryLimit: {{ .Values.cronjob.failedJobsHistoryLimit }}
  successfulJobsHistoryLimit: {{ .Values.cronjob.successfulJobsHistoryLimit }}
  jobTemplate:
    spec:
      template:
        metadata:
          {{- with .Values.podAnnotations }}
          annotations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          labels:
            {{- include "mnemosyne.selectorLabels" . | nindent 12 }}
        spec:
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          serviceAccountName: {{ include "mnemosyne.serviceAccountName" . }}
          securityContext:
            {{- toYaml .Values.podSecurityContext | nindent 12 }}
          containers:
            - name: {{ .Chart.Name }}
              securityContext:
                {{- toYaml .Values.securityContext | nindent 16 }}
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "mnemosyne.fullname" . }}-secrets
                      key: DATABASE_URL
                - name: LITELLM_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "mnemosyne.fullname" . }}-secrets
                      key: LITELLM_API_KEY
                - name: COLLECTION_NAME
                  value: {{ .Values.config.collectionName | quote }}
                - name: EMBEDDING_MODEL
                  value: {{ .Values.config.embeddingModel | quote }}
                - name: LITELLM_URL
                  value: {{ .Values.config.litellmUrl | quote }}
                - name: NFS_PATH
                  {{- if .Values.config.nfsPathFromSecret }}
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "mnemosyne.fullname" . }}-secrets
                      key: NFS_PATH
                  {{- else }}
                  value: {{ .Values.config.nfsPath | quote }}
                  {{- end }}
                - name: ONESHOT
                  value: "true"
              volumeMounts:
                {{- range .Values.persistence.volumes }}
                - name: {{ .name }}
                  mountPath: {{ .mountPath }}
                  {{- if .readOnly }}
                  readOnly: {{ .readOnly }}
                  {{- end }}
                {{- end }}
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
          restartPolicy: OnFailure
          volumes:
            {{- range .Values.persistence.volumes }}
            - name: {{ .name }}
              {{- if .nfs }}
              nfs:
                {{- toYaml .nfs | nindent 16 }}
              {{- else if .claimName }}
              persistentVolumeClaim:
                claimName: {{ .claimName }}
              {{- else if .hostPath }}
              hostPath:
                {{- toYaml .hostPath | nindent 16 }}
              {{- end }}
            {{- end }}
          {{- with .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
