apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
spec:
  ports:
  - port: {{ .Values.service.port }}
    targetPort: 8000
  selector:
    app: {{ .Release.Name }}
---
{{- if .Values.ingress.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ .Release.Name }}
spec:
  entryPoints:
    - websecure
  routes:
  - match: Host(`{{ .Values.ingress.host }}`)
    kind: Rule
    services:
    - name: {{ .Release.Name }}
      port: {{ .Values.service.port }}
  tls:
    secretName: {{ .Values.ingress.tlsSecret }}
{{- end }}
