{{- if .Values.tei.embedder.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mnemosyne.fullname" . }}-tei-embedder
  labels:
    {{- include "mnemosyne.labels" . | nindent 4 }}
    app: tei-embedder
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "mnemosyne.selectorLabels" . | nindent 6 }}
      app: tei-embedder
  template:
    metadata:
      labels:
        {{- include "mnemosyne.selectorLabels" . | nindent 8 }}
        app: tei-embedder
    spec:
      {{- if .Values.tei.embedder.runtimeClassName }}
      runtimeClassName: {{ .Values.tei.embedder.runtimeClassName }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: tei
        image: "{{ .Values.tei.embedder.image.repository | default "ghcr.io/huggingface/text-embeddings-inference" }}:{{ .Values.tei.embedder.image.tag | default "cpu-latest" }}"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        args:
        - --model-id
        - {{ .Values.tei.embedder.model }}
        - --port
        - "80"
        {{- if .Values.tei.embedder.dtype }}
        - --dtype
        - {{ .Values.tei.embedder.dtype }}
        {{- end }}
        {{- if .Values.tei.embedder.maxBatchTokens }}
        - --max-batch-tokens
        - {{ .Values.tei.embedder.maxBatchTokens | quote }}
        {{- end }}
        ports:
        - containerPort: 80
        env:
        - name: HUGGING_FACE_HUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ include "mnemosyne.fullname" . }}-secrets
              key: HF_TOKEN
        {{- if .Values.tei.embedder.env }}
        {{- toYaml .Values.tei.embedder.env | nindent 8 }}
        {{- end }}
        resources:
          {{- toYaml .Values.tei.embedder.resources | nindent 10 }}
        volumeMounts:
        - name: data
          mountPath: /data
      nodeSelector:
        kubernetes.io/hostname: vm169
      tolerations:
      - key: special-node
        operator: Equal
        value: gpu
        effect: NoSchedule
      volumes:
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mnemosyne.fullname" . }}-tei-embedder
spec:
  ports:
  - port: 80
    targetPort: 80
  selector:
    {{- include "mnemosyne.selectorLabels" . | nindent 4 }}
    app: tei-embedder
{{- end }}
