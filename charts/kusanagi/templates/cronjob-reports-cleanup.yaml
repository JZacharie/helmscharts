{{- if .Values.reportsCleanup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "kusanagi.fullname" . }}-reports-cleanup
  labels:
    {{- include "kusanagi.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.reportsCleanup.schedule | quote }}
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 1
  successfulJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          name: {{ include "kusanagi.fullname" . }}-reports-cleanup
          labels:
            {{- include "kusanagi.selectorLabels" . | nindent 12 }}
        spec:
          restartPolicy: OnFailure
          containers:
          - name: cleanup
            image: minio/mc:latest
            imagePullPolicy: IfNotPresent
            command:
            - /bin/sh
            - -c
            - |
              set -xe
              echo "=== Starting S3 reports cleanup ==="
              echo "Endpoint: $S3_ENDPOINT"
              echo "Bucket:   $S3_BUCKET"
              echo "OlderThan: {{ .Values.reportsCleanup.olderThan }}"
              mc alias set myminio "$S3_ENDPOINT" "$S3_ACCESS_KEY" "$S3_SECRET_KEY"
              mc rm --recursive --force --older-than {{ .Values.reportsCleanup.olderThan }} myminio/"$S3_BUCKET"/ || echo "No files to remove or removal completed."
              echo "=== Cleanup done ==="
            env:
            - name: S3_ENDPOINT
              value: {{ .Values.s3.endpoint | default "https://minio-170-api.zacharie.org" | quote }}
            - name: S3_BUCKET
              value: {{ .Values.s3.bucket | default "kusanagi-news" | quote }}
            {{- if .Values.s3.access_key }}
            - name: S3_ACCESS_KEY
              value: {{ .Values.s3.access_key | quote }}
            - name: S3_SECRET_KEY
              value: {{ .Values.s3.secret_key | quote }}
            {{- else }}
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: kusanagi-secrets
                  key: S3_ACCESS_KEY
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: kusanagi-secrets
                  key: S3_SECRET_KEY
            {{- end }}
{{- end }}
