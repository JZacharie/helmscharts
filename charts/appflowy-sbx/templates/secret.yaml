apiVersion: v1
kind: Secret
metadata:
  name: {{ include "appflowy-sbx.secretName" . }}
  labels:
    {{- include "appflowy-sbx.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Database credentials
  POSTGRES_PASSWORD: {{ default .Values.database.password (index .Values "global" "secret" "postgres" "appflowy" "postgresPassword" "value" | default (index .Values "global" "secret" "postgres" "adminPassword" "value" | default "")) | quote }}
  DATABASE_URL: {{ include "appflowy-sbx.databaseUrl" . | quote }}
  GOTRUE_DATABASE_URL: {{ include "appflowy-sbx.gotrueDatabaseUrl" . | quote }}
  
  # JWT secret
  JWT_SECRET: {{ default .Values.jwt.secret (index .Values "global" "secret" "jwt" "secret" "value" | default "") | quote }}
  GOTRUE_JWT_SECRET: {{ default .Values.jwt.secret (index .Values "global" "secret" "jwt" "secret" "value" | default "") | quote }}
  
  # SMTP credentials
  SMTP_PASSWORD: {{ default .Values.smtp.password (index .Values "global" "secret" "smtp" "password" "value" | default "") | quote }}
  GOTRUE_SMTP_PASS: {{ default .Values.smtp.password (index .Values "global" "secret" "smtp" "password" "value" | default "") | quote }}
  
  # S3/MinIO credentials
  S3_ACCESS_KEY: {{ default .Values.s3.accessKey (index .Values "global" "s3" "accessKey" | default "") | quote }}
  S3_SECRET_KEY: {{ default .Values.s3.secretKey (index .Values "global" "secret" "s3" "secret" "value" | default "") | quote }}
  
  # GoTrue admin password
  GOTRUE_ADMIN_PASSWORD: {{ default .Values.gotrue.adminPassword (index .Values "global" "secret" "gotrue" "adminPassword" "value" | default "") | quote }}
