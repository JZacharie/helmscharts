surrealdb:
  image:
    repository: surrealdb/surrealdb
    tag: v2
    pullPolicy: IfNotPresent
  auth:
    user: root
    pass: root
  persistence:
    enabled: true
    size: 2Gi
    storageClass: ""
  service:
    port: 8000

openNotebook:
  image:
    repository: lfnovo/open_notebook
    tag: v1-latest
    pullPolicy: IfNotPresent
  encryptionKey: "change-me-to-a-secret-string"
  existingSecret: ""
  persistence:
    enabled: true
    size: 2Gi
    storageClass: ""
  service:
    ports:
      http: 8502
      api: 5055

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: open-notebook.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
