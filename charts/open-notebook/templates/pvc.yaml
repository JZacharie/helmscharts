{{- if .Values.openNotebook.persistence.enabled -}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "open-notebook.fullname" . }}-notebook-data
  labels:
    app.kubernetes.io/component: notebook
    {{- include "open-notebook.labels" . | nindent 4 }}
spec:
  accessModes: [ "ReadWriteOnce" ]
  {{- if .Values.openNotebook.persistence.storageClass }}
  storageClassName: {{ .Values.openNotebook.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.openNotebook.persistence.size }}
{{- end }}
