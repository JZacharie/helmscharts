apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mnemosyne-ui.fullname" . }}
  labels:
    {{- include "mnemosyne-ui.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "mnemosyne-ui.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mnemosyne-ui.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default "latest" }}"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: assets
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
      volumes:
        - name: assets
          configMap:
            name: {{ include "mnemosyne-ui.fullname" . }}-assets
