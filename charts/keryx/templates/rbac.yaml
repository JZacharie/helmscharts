apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "keryx.fullname" . }}-orchestrator-sa
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "keryx.fullname" . }}-orchestrator-scaler-binding
subjects:
- kind: ServiceAccount
  name: {{ include "keryx.fullname" . }}-orchestrator-sa
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: keryx-orchestrator-scaler
  apiGroup: rbac.authorization.k8s.io
