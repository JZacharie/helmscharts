{{- if .Values.setupJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "appflowy-sbx.fullname" . }}-setup
  labels:
    {{- include "appflowy-sbx.labels" . | nindent 4 }}
    app.kubernetes.io/component: setup-job
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: {{ .Values.setupJob.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "appflowy-sbx.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: setup-job
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: Never
      containers:
      - name: setup-db
        {{- with .Values.securityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        image: "{{ .Values.setupJob.image.repository }}:{{ .Values.setupJob.image.tag }}"
        imagePullPolicy: {{ .Values.setupJob.image.pullPolicy }}
        command:
          - /bin/bash
          - -c
          - |
            set -e
            echo "Waiting for PostgreSQL to be ready..."
            until pg_isready; do
              echo "Waiting for database..."
              sleep 2
            done
            
            echo "Creating database if not exists..."
            psql -d postgres <<EOF
            SELECT 'CREATE DATABASE {{ include "appflowy-sbx.databaseName" . }}' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = '{{ include "appflowy-sbx.databaseName" . }}')\gexec
            EOF
            
            echo "Enabling pgvector extension..."
            psql -d {{ include "appflowy-sbx.databaseName" . }} <<EOF
            CREATE EXTENSION IF NOT EXISTS vector;
            EOF
            
            echo "Database setup completed successfully"
        env:
          - name: PGUSER
            value: {{ include "appflowy-sbx.databaseUser" . | quote }}
          - name: PGHOST
            value: {{ include "appflowy-sbx.databaseHost" . | quote }}
          - name: PGPORT
            value: {{ include "appflowy-sbx.databasePort" . | quote }}
          - name: PGPASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ include "appflowy-sbx.secretName" . }}
                key: POSTGRES_PASSWORD
        {{- with .Values.setupJob.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
{{- end }}
