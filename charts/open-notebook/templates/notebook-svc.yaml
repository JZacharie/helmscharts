apiVersion: v1
kind: Service
metadata:
  name: {{ include "open-notebook.fullname" . }}
  labels:
    app.kubernetes.io/component: notebook
    {{- include "open-notebook.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.openNotebook.service.ports.http }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.openNotebook.service.ports.api }}
      targetPort: api
      protocol: TCP
      name: api
  selector:
    app.kubernetes.io/component: notebook
    {{- include "open-notebook.selectorLabels" . | nindent 4 }}
