{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "mnemosyne.fullname" . }}-secrets
  labels:
    {{- include "mnemosyne.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreName | default "vault-backend" }}
    kind: {{ .Values.externalSecrets.secretStoreKind | default "ClusterSecretStore" }}
  target:
    name: {{ include "mnemosyne.fullname" . }}-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        DATABASE_URL: "postgres://{{ .Values.config.dbUser }}:{{ `{{ .db_password }}` }}@{{ .Values.config.dbHost }}:5432/{{ .Values.config.dbName }}"
        LITELLM_API_KEY: "{{ `{{ .litellm_api_key }}` }}"
        NFS_PATH: "{{ `{{ .nfs_path }}` }}"
        HF_TOKEN: "{{ `{{ .hf_token }}` }}"
  data:
  - secretKey: db_password
    remoteRef:
      key: ai/mnemosyne
      property: DATABASE_PASSWORD
  - secretKey: litellm_api_key
    remoteRef:
      key: {{ .Values.externalSecrets.vaultPath }}
      property: LITELLM_API_KEY
  - secretKey: nfs_path
    remoteRef:
      key: {{ .Values.externalSecrets.vaultPath }}
      property: NFS_PATH
  - secretKey: hf_token
    remoteRef:
      key: ai/litellm
      property: huggingface_token
{{- end }}
